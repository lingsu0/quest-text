<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线练题系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 头部 -->
  <header class="header">
    <div class="container">
      <h1>在线练题系统</h1>
      <p>HTML + TypeScript 原生实现</p>
    </div>
  </header>

  <main class="container">
    <!-- 首页 -->
    <div id="home-page" class="page">
      <!-- 模式选择 -->
      <div class="mode-selection">
        <div class="mode-card" id="mode-practice">
          <div class="mode-icon">📚</div>
          <h3>练习模式</h3>
          <p>答完一题立即显示答案和解析，适合学习和巩固知识</p>
        </div>
        <div class="mode-card" id="mode-exam">
          <div class="mode-icon">📝</div>
          <h3>考试模式</h3>
          <p>全部答完后统一提交，显示总分和答题报告</p>
        </div>
      </div>

      <!-- 筛选栏 -->
      <div class="filter-bar">
        <select id="filter-type">
          <option value="">全部题型</option>
          <option value="single_choice">单选题</option>
          <option value="multiple_choice">多选题</option>
          <option value="fill_blank">填空题</option>
          <option value="true_false">判断题</option>
          <option value="coding">编程题</option>
          <option value="short_answer">简答题</option>
        </select>
        <select id="filter-difficulty">
          <option value="">全部难度</option>
          <option value="easy">简单</option>
          <option value="medium">中等</option>
          <option value="hard">困难</option>
        </select>
        <input type="text" id="search-keyword" placeholder="搜索题目关键词...">
      </div>

      <!-- 题目列表 -->
      <div id="question-list">
        <div class="empty-state">正在加载题目...</div>
      </div>
    </div>

    <!-- 答题页面 -->
    <div id="exam-page" class="page hidden">
      <div class="exam-layout">
        <!-- 题目区域 -->
        <div class="question-area">
          <div id="question-container">
            <!-- 动态渲染题目内容 -->
          </div>
          
          <!-- 控制按钮 -->
          <div class="control-buttons">
            <button id="btn-prev" class="btn btn-outline">上一题</button>
            <button id="btn-submit" class="btn btn-primary">提交答案</button>
            <button id="btn-next" class="btn btn-outline">下一题</button>
            <button id="btn-back-home" class="btn btn-danger">返回首页</button>
          </div>
        </div>

        <!-- 侧边栏 -->
        <div class="sidebar">
          <!-- 进度卡片 -->
          <div class="progress-card">
            <h3>答题进度</h3>
            <div class="progress-info">
              <span>第 <span id="current-num">1</span> / <span id="total-num">10</span> 题</span>
              <span>已答 <span id="answered-count">0</span> 题</span>
            </div>
            <div class="progress-bar-container">
              <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
            </div>
            <div class="progress-stats">
              <div class="stat-item">
                <div class="stat-value" id="stat-correct">0</div>
                <div class="stat-label">正确</div>
              </div>
              <div class="stat-item">
                <div class="stat-value" id="stat-wrong">0</div>
                <div class="stat-label">错误</div>
              </div>
            </div>
          </div>

          <!-- 题号导航 -->
          <div class="nav-card">
            <h3>题号导航</h3>
            <div id="nav-numbers" class="nav-numbers">
              <!-- 动态渲染题号 -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 结果页面 -->
    <div id="result-page" class="page hidden">
      <div class="result-container">
        <div class="result-summary">
          <h2>考试结果</h2>
          <div class="result-stats">
            <div class="result-stat">
              <div class="result-stat-value" id="result-total">0</div>
              <div class="result-stat-label">总题数</div>
            </div>
            <div class="result-stat">
              <div class="result-stat-value" id="result-answered">0</div>
              <div class="result-stat-label">已答题</div>
            </div>
            <div class="result-stat correct">
              <div class="result-stat-value" id="result-correct">0</div>
              <div class="result-stat-label">正确数</div>
            </div>
            <div class="result-stat wrong">
              <div class="result-stat-value" id="result-wrong">0</div>
              <div class="result-stat-label">错误数</div>
            </div>
            <div class="result-stat">
              <div class="result-stat-value" id="result-accuracy">0%</div>
              <div class="result-stat-label">正确率</div>
            </div>
            <div class="result-stat">
              <div class="result-stat-value" id="result-score">0</div>
              <div class="result-stat-label">得分</div>
            </div>
            <div class="result-stat">
              <div class="result-stat-value" id="result-total-points">0</div>
              <div class="result-stat-label">总分</div>
            </div>
            <div class="result-stat">
              <div class="result-stat-value" id="result-duration">00:00</div>
              <div class="result-stat-label">用时</div>
            </div>
          </div>
        </div>

        <div class="wrong-list">
          <h3>错题回顾</h3>
          <div id="wrong-list">
            <!-- 动态渲染错题 -->
          </div>
        </div>

        <div class="control-buttons">
          <button id="btn-retry" class="btn btn-primary">重新练习</button>
          <button id="btn-back-home-result" class="btn btn-outline">返回首页</button>
        </div>
      </div>
    </div>
  </main>

  <!-- 加载 TypeScript 编译后的 JS -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
